    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #10B981;
            --green-dark: #059669;
            --green-darker: #047857;
            --green-deep: #065f46;
            --ink: #0f172a;
            --ink-soft: #475569;
            --bg-top: #ffffff;
            --bg-bottom: #f0fdf4;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--ink);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .lp-brand {
            padding: 1rem 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(16, 185, 129, 0.15);
        }

        .lp-brand-logo {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .lp-brand-logo img {
            height: 50px;
            width: auto;
        }

        .lp-back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.5rem 1rem;
            background: transparent;
            color: var(--green);
            border: 2px solid var(--green);
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
            transition: background 0.3s ease, color 0.3s ease, transform 0.15s ease;
            cursor: pointer;
        }

        .lp-back-home::before {
            content: '←';
            font-size: 1rem;
            line-height: 1;
        }

        .lp-back-home:hover,
        .lp-back-home:focus-visible {
            background: rgba(16, 185, 129, 0.05);
            outline: none;
        }

        .lp-back-home:active {
            transform: translateY(1px);
        }

        .lp-hero {
            flex: 1;
            padding: 4px 16px 16px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .lp-eyebrow {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--green-dark);
            background: rgba(16, 185, 129, 0.10);
            padding: 6px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
        }

        .lp-hero h1 {
            font-size: 1.45rem;
            font-weight: 800;
            line-height: 1.22;
            letter-spacing: -0.01em;
            margin-bottom: 14px;
            color: var(--ink);
        }

        .lp-hero h1 .accent {
            background: linear-gradient(135deg, var(--green-deep) 0%, var(--green) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            background: #000;
            aspect-ratio: 9 / 16;
            outline: none;
        }

        .video-wrapper:focus-visible {
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18),
                        0 0 0 4px rgba(16, 185, 129, 0.55);
        }

        .video-wrapper video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        /* Mute / unmute toggle in top-right corner of video */
        .video-mute-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 3;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            background: rgba(0, 0, 0, 0.62);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
        }

        .video-mute-toggle:hover,
        .video-mute-toggle:focus-visible {
            background: rgba(0, 0, 0, 0.85);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
            outline: none;
        }

        .video-mute-toggle:active { transform: translateY(0); }

        .video-mute-toggle .mute-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: none;
        }

        .video-wrapper.is-muted .video-mute-toggle .mute-icon--muted   { display: block; }
        .video-wrapper:not(.is-muted) .video-mute-toggle .mute-icon--unmuted { display: block; }

        .video-mute-toggle .mute-label { display: none; }
        .video-wrapper.is-muted .video-mute-toggle .mute-label { display: inline; }

        .video-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper.playing .video-play-overlay { opacity: 0; }

        .video-play-button {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .video-wrapper:hover .video-play-button {
            transform: scale(1.08);
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-darker) 100%);
        }

        .video-play-button::before {
            content: '';
            width: 0; height: 0;
            border-left: 22px solid white;
            border-top: 13px solid transparent;
            border-bottom: 13px solid transparent;
            margin-left: 6px;
        }

        .lp-cta-block {
            width: 100%;
            max-width: 540px;
            margin-top: 18px;
            text-align: center;
        }

        .lp-btn-primary {
            display: block;
            width: 100%;
            padding: 16px 22px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 1.06rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.38);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.25s ease;
            cursor: pointer;
        }

        .lp-btn-primary:hover,
        .lp-btn-primary:focus-visible {
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-darker) 100%);
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(16, 185, 129, 0.48);
            outline: none;
        }

        .lp-btn-primary:active { transform: translateY(0); }

        .lp-trust {
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--ink-soft);
        }

        .lp-trust strong {
            color: var(--green-dark);
            font-weight: 700;
        }

        .lp-footer {
            padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
            text-align: center;
            font-size: 0.76rem;
            color: var(--ink-soft);
        }

        .lp-footer a {
            color: var(--ink-soft);
            text-decoration: underline;
            margin: 0 6px;
        }

        @media (min-width: 720px) {
            .lp-brand {
                padding: 1rem 24px;
            }

            .lp-hero { padding: 16px 24px 32px; }

            .lp-hero h1 {
                font-size: 2.1rem;
                line-height: 1.2;
                margin-bottom: 22px;
            }

            .lp-eyebrow {
                font-size: 0.78rem;
                margin-bottom: 16px;
            }

            .lp-cta-block { margin-top: 24px; }

            .lp-btn-primary {
                padding: 18px 28px;
                font-size: 1.12rem;
            }

            .video-wrapper { max-width: 360px; }

            .video-play-button { width: 92px; height: 92px; }
            .video-play-button::before {
                border-left: 28px solid white;
                border-top: 17px solid transparent;
                border-bottom: 17px solid transparent;
                margin-left: 8px;
            }

            .video-mute-toggle {
                top: 14px;
                right: 14px;
                padding: 8px 14px;
                font-size: 0.82rem;
            }
        }

        @media (max-width: 360px) {
            .lp-hero h1 { font-size: 1.25rem; }
            .lp-btn-primary { padding: 14px 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header class="lp-brand">

    <main class="lp-hero">

        <h1>
            Are you getting crushed by NEM 3.0?<br>
            <span class="accent">Watch this.</span>
        </h1>

        <div class="video-wrapper is-muted" id="videoWrapper" role="button" tabindex="0" aria-label="Play or pause video">
            <video id="showcaseVideo" preload="metadata" playsinline muted>
                <source src="../assets/videos/unlock_huge_savings_optimize_your_powerwalls_now.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-play-overlay">
                <div class="video-play-button" aria-hidden="true"></div>
            </div>
            <button type="button" class="video-mute-toggle" id="videoMuteToggle" aria-label="Unmute video">
                <svg class="mute-icon mute-icon--muted" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                </svg>
                <svg class="mute-icon mute-icon--unmuted" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <span class="mute-label">Tap to unmute</span>
            </button>
        </div>

        <div class="lp-cta-block">
            <a href="../diy-registration-step1.html" class="lp-btn-primary" id="lpCta">
                Calculate My Savings — Free
            </a>
            <p class="lp-trust">
                <strong>Free</strong> · Takes ~2 minutes · Built for California NEM 3.0
            </p>
        </div>

    <footer class="lp-footer">
        <p>
            © <span id="lpYear"></span> MicroGrid LLC ·
            <a href="../privacy.html">Privacy</a> ·
            <a href="../terms.html">Terms</a>
        </p>
    </footer>

    <script>
        (function () {
            const wrapper = document.getElementById('videoWrapper');
            const video = document.getElementById('showcaseVideo');
            const cta = document.getElementById('lpCta');
            const yearEl = document.getElementById('lpYear');

            if (yearEl) yearEl.textContent = new Date().getFullYear();

            function track(eventName, extra) {
                if (typeof gtag !== 'undefined') {
                    gtag('event', eventName, Object.assign({
                        event_category: 'nem3_landing'
                    }, extra || {}));
                }
            }

            if (wrapper && video) {
                let firstPlayTracked = false;

                function togglePlayback() {
                    if (video.paused || video.ended) {
                        const p = video.play();
                        if (p && typeof p.catch === 'function') {
                            p.catch(function () { /* autoplay blocked */ });
                        }
                    } else {
                        video.pause();
                    }
                }

                wrapper.addEventListener('click', function (e) {
                    if (e.target.closest('.video-mute-toggle')) return;
                    togglePlayback();
                });
                wrapper.addEventListener('keydown', function (e) {
                    if (e.target.closest('.video-mute-toggle')) return;
                    if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        togglePlayback();
                    }
                });

                video.addEventListener('play', function () {
                    wrapper.classList.add('playing');
                    if (!firstPlayTracked) {
                        firstPlayTracked = true;
                        track('nem3_video_play');
                    }
                });
                video.addEventListener('pause', function () { wrapper.classList.remove('playing'); });
                video.addEventListener('ended', function () {
                    wrapper.classList.remove('playing');
                    track('nem3_video_complete');
                });

                const muteToggle = document.getElementById('videoMuteToggle');
                if (muteToggle) {
                    function syncMuteState() {
                        if (video.muted || video.volume === 0) {
                            wrapper.classList.add('is-muted');
                            muteToggle.setAttribute('aria-label', 'Unmute video');
                        } else {
                            wrapper.classList.remove('is-muted');
                            muteToggle.setAttribute('aria-label', 'Mute video');
                        }
                    }

                    muteToggle.addEventListener('click', function (e) {
                        e.stopPropagation();
                        const willUnmute = video.muted;
                        video.muted = !video.muted;
                        if (willUnmute) {
                            video.volume = 1;
                            if (video.paused) {
                                const p = video.play();
                                if (p && typeof p.catch === 'function') p.catch(function () {});
                            }
                        }
                        syncMuteState();
                        track('nem3_video_mute_toggle', { event_label: willUnmute ? 'unmute' : 'mute' });
                    });

                    video.addEventListener('volumechange', syncMuteState);
                    syncMuteState();
                }
            }

            if (cta) {
                cta.addEventListener('click', function () {
                    track('nem3_cta_click', { event_label: 'calculate_my_savings' });
                });
            }

            const backHome = document.getElementById('lpBackHome');
            if (backHome) {
                backHome.addEventListener('click', function () {
                    track('nem3_back_home_click');
                });
            }
        })();
    </script>
