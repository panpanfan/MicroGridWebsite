    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #10B981;
            --green-dark: #059669;
            --green-darker: #047857;
            --green-deep: #065f46;
            --ink: #0f172a;
            --ink-soft: #475569;
            --bg-top: #ffffff;
            --bg-bottom: #f0fdf4;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--ink);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .lp-brand {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lp-brand img {
            height: 28px;
            width: auto;
        }

        .lp-hero {
            flex: 1;
            padding: 4px 16px 16px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .lp-eyebrow {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--green-dark);
            background: rgba(16, 185, 129, 0.10);
            padding: 6px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
        }

        .lp-hero h1 {
            font-size: 1.45rem;
            font-weight: 800;
            line-height: 1.22;
            letter-spacing: -0.01em;
            margin-bottom: 14px;
            color: var(--ink);
        }

        .lp-hero h1 .accent {
            background: linear-gradient(135deg, var(--green-deep) 0%, var(--green) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 720px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            background: #000;
            aspect-ratio: 16 / 9;
            outline: none;
        }

        .video-wrapper:focus-visible {
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18),
                        0 0 0 4px rgba(16, 185, 129, 0.55);
        }

        .video-wrapper video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .video-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper.playing .video-play-overlay { opacity: 0; }

        .video-play-button {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .video-wrapper:hover .video-play-button {
            transform: scale(1.08);
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-darker) 100%);
        }

        .video-play-button::before {
            content: '';
            width: 0; height: 0;
            border-left: 22px solid white;
            border-top: 13px solid transparent;
            border-bottom: 13px solid transparent;
            margin-left: 6px;
        }

        .lp-cta-block {
            width: 100%;
            max-width: 540px;
            margin-top: 18px;
            text-align: center;
        }

        .lp-btn-primary {
            display: block;
            width: 100%;
            padding: 16px 22px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 1.06rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.38);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.25s ease;
            cursor: pointer;
        }

        .lp-btn-primary:hover,
        .lp-btn-primary:focus-visible {
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-darker) 100%);
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(16, 185, 129, 0.48);
            outline: none;
        }

        .lp-btn-primary:active { transform: translateY(0); }

        .lp-trust {
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--ink-soft);
        }

        .lp-trust strong {
            color: var(--green-dark);
            font-weight: 700;
        }

        .lp-footer {
            padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
            text-align: center;
            font-size: 0.76rem;
            color: var(--ink-soft);
        }

        .lp-footer a {
            color: var(--ink-soft);
            text-decoration: underline;
            margin: 0 6px;
        }

        @media (min-width: 720px) {
            .lp-brand {
                padding: 18px 24px;
                justify-content: flex-start;
                max-width: 1080px;
                margin: 0 auto;
                width: 100%;

            .lp-brand img { height: 34px; }

            .lp-hero { padding: 16px 24px 32px; }

            .lp-hero h1 {

<body>
    <header class="lp-brand">
        <a href="../index.html" aria-label="MicroVPP home">

    <main class="lp-hero">
        <span class="lp-eyebrow">For California Powerwall Owners</span>

        <h1>
            Are you getting crushed by NEM 3.0?<br>
            <span class="accent">Watch this.</span>
        </h1>

        <div class="video-wrapper" id="videoWrapper" role="button" tabindex="0" aria-label="Play or pause video">
            <video id="showcaseVideo" preload="metadata" playsinline muted>
                <source src="../assets/videos/unlock_huge_savings_optimize_your_powerwalls_now.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-play-overlay">
                <div class="video-play-button" aria-hidden="true"></div>
            </div>
        </div>

        <div class="lp-cta-block">
            <a href="../diy-registration-step1.html" class="lp-btn-primary" id="lpCta">
                Calculate My Savings — Free
            </a>

                <strong>Free</strong> · Takes ~2 minutes · Built for California NEM 3.0
            </p>
        </div>
    </main>

    <footer class="lp-footer">
        <p>
            © <span id="lpYear"></span> MicroGrid LLC ·
            <a href="../privacy.html">Privacy</a> ·
            <a href="../terms.html">Terms</a>
        </p>
    </footer>

    <script>
        (function () {
            const wrapper = document.getElementById('videoWrapper');
            const video = document.getElementById('showcaseVideo');
            const cta = document.getElementById('lpCta');
            const yearEl = document.getElementById('lpYear');

            if (yearEl) yearEl.textContent = new Date().getFullYear();

            function track(eventName, extra) {
                if (typeof gtag !== 'undefined') {
                    gtag('event', eventName, Object.assign({
                        event_category: 'nem3_landing'
                    }, extra || {}));
                }
            }

            if (wrapper && video) {
                let firstPlayTracked = false;

                function togglePlayback() {
                    if (video.paused || video.ended) {
                        const p = video.play();
                        if (p && typeof p.catch === 'function') {
                            p.catch(function () { /* autoplay blocked */ });
                        }
                    } else {
                        video.pause();
                    }
                }

                wrapper.addEventListener('click', togglePlayback);
                wrapper.addEventListener('keydown', function (e) {
                    if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        togglePlayback();
                    }
                });

                video.addEventListener('play', function () {
                    wrapper.classList.add('playing');
                    if (!firstPlayTracked) {
                        firstPlayTracked = true;
                        track('nem3_video_play');
                    }
                });
                video.addEventListener('pause', function () { wrapper.classList.remove('playing'); });
                video.addEventListener('ended', function () {
                    wrapper.classList.remove('playing');
                    track('nem3_video_complete');
                });
            }

            if (cta) {
                cta.addEventListener('click', function () {
                    track('nem3_cta_click', { event_label: 'calculate_my_savings' });
                });
            }
        })();
    </script>
